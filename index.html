<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AISI - Login</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">
                    <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect width="48" height="48" rx="8" fill="#3B82F6"/>
                        <path d="M24 12L32 20H28V32H20V20H16L24 12Z" fill="white"/>
                    </svg>
                </div>
                <h1>AISI</h1>
                <p>AI-Powered Istitabah Management System</p>
            </div>

            <form class="login-form" id="loginForm">
                <p id="loginError" class="login-error" style="display: none;"></p>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                        <button type="button" class="password-toggle-btn" data-target="password" aria-label="Show password">
                            <svg class="icon-eye" width="18" height="18" viewBox="0 0 20 20" fill="currentColor">
                                <path d="M10 12a2 2 0 100-4 2 2 0 000 4z"/>
                                <path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd"/>
                            </svg>
                            <svg class="icon-eye-off" width="18" height="18" viewBox="0 0 20 20" fill="currentColor">
                                <path d="M3.707 2.293a1 1 0 00-1.414 1.414l14 14a1 1 0 001.414-1.414l-1.473-1.473A10.014 10.014 0 0019.542 10C18.268 5.943 14.478 3 10 3a9.958 9.958 0 00-4.512 1.074L3.707 2.293zM7.958 6.554l1.514 1.514a2 2 0 012.45 2.45l1.514 1.514a4 4 0 00-5.478-5.478z"/>
                                <path d="M12.454 16.697l-2.708-2.708a4 4 0 01-3.71-3.71L2.336 6.578A9.98 9.98 0 00.458 10c1.274 4.057 5.065 7 9.542 7 .847 0 1.669-.105 2.454-.303z"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" name="remember">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-password">Forgot password?</a>
                </div>

                <button type="submit" class="btn-primary">Sign in</button>
            </form>

            <div class="login-footer">
                <p>&copy; 2025 Jabatan Mufti. All rights reserved.</p>
            </div>
        </div>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
